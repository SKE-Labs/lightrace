name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the details below so we can reproduce and fix it.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this issue?
      placeholder: |
        1. Set up LightRace with `lightrace init && lightrace start`
        2. Send a trace using the Python SDK
        3. Open the trace viewer
        4. See error...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true

  - type: dropdown
    id: deployment
    attributes:
      label: Deployment Method
      options:
        - CLI (lightrace start)
        - Docker Compose (manual)
        - Development (pnpm dev)
        - Other
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      description: "CLI version (`lightrace version`) or SDK version"
      placeholder: "e.g., CLI v0.1.2, lightrace-python 0.1.2"

  - type: dropdown
    id: sdk
    attributes:
      label: SDK
      options:
        - JavaScript
        - Python

  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs
      description: Paste any relevant logs or error messages.
      render: shell

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other context, screenshots, or information.
