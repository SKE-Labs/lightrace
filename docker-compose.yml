services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: lightrace
      POSTGRES_PASSWORD: lightrace
      POSTGRES_DB: lightrace
    ports:
      - "127.0.0.1:5435:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lightrace"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
